<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>

    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='styles.css'>
    <script src='main.js'></script>
</head>
<body>
    <header class="banner">
     <div class="banner-content">
        <h1>Pizzaria do HEROI</h1>
        <p>A Pizza que vai acabar com o vilão da sua fome</p>
        <nav>
            <a href="#Pizzas">Pizzaria</a>
            <a href="#bebidas">Bebidas</a>
            <a href="#pedido">Pedido</a>
            <a href="#contato">Contato</a>


        </nav>

     </div>
    </header>
    <main>
        <section id="Pizzas" class="categoria">
        <h2>Pizzas</h2>
        <div class="produto"</div> 
            <img src="images/images (1).jpg" alt="">
            <h3>Pizza de calabresa</h3>
            <p>Calabresa em rodelas e queijo Londrina</p>
            <span class="preço">R$79,90</span>
            <button class="adicionar"> Adicionar</button>
        </div>
        <div class="produto"</div> 
            <img src="images/images (2).jpg" alt="">
            <h3>Pizza de frango</h3>
            <p>Frango em pedaços</p>
            <span class="preço">R$79,90</span>
            <button class="adicionar"> Adicionar</button>

            <div class="produto"</div> 
                <img src="images/images.jpg" alt="">
                <h3>Pizza de berinjela</h3>
                <p>Berinjela em rodelas</p>
                <span class="preço">R$79,90</span>
                <button class="adicionar"> Adicionar</button>
                
            </section>
        <section id="bebidas" class="categoria">
        </section>
        <section id="pedido"></section>
        <section id="contato"></section>

        
 

    </main>

<footer>
